<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | zetoxcz</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 50% 30%, #111 0%, #0a0a0a 80%);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(120, 90, 255, 0.2);
            padding-bottom: 20px;
        }

        .header .back-btn {
            display: inline-flex;
            align-items: center;
            color: #785aff;
            text-decoration: none;
            font-size: 20px;
            transition: color 0.3s ease, transform 0.3s ease;
            width: 40px;
            text-align: left;
        }

        .header .back-btn:hover {
            color: #a88aff;
            transform: translateX(-4px);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin: 0;
            text-align: center;
            flex: 1; 
        }

        .header span {
            width: 40px; 
        }

        .report-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            border: 1px solid rgba(120, 90, 255, 0.15);
            border-radius: 14px;
            margin-bottom: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(2px);
            text-decoration: none;
            color: #e0e0e0;
        }

        .report-item:hover {
            background: rgba(15, 12, 25, 0.6);
            border-color: rgba(120, 90, 255, 0.4);
            transform: translateX(6px);
            box-shadow: 0 5px 20px rgba(120, 90, 255, 0.05);
        }

        .report-item i.main-icon {
            font-size: 20px;
            color: #785aff;
            width: 24px;
            text-align: center;
        }

        .report-item .info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .report-item .title {
            font-weight: 600;
            font-size: 16px;
            color: #fff;
        }

        .report-item .desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }

        .report-item .tags {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .report-item .tag {
            font-size: 11px;
            font-weight: 600;
            color: #a88aff;
            background: rgba(120, 90, 255, 0.07);
            border: 1px solid rgba(120, 90, 255, 0.2);
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .report-item .date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            align-self: flex-start;
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .report-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .report-item i.main-icon {
                text-align: left;
                width: auto;
            }
            .report-item .date {
                align-self: flex-end;
                margin-top: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-folder-open" style="color: #785aff;"></i> Reports</h1>
            <span></span>
        </div>

        <a href="/reports/solara" class="report-item">
            <i class="fas fa-file-lines main-icon"></i>
            <div class="info">
                <div class="title">RE // SolaraBootstrapper.exe</div>
                <div class="desc">RustC dropper (не дописано)</div>
                <div class="tags">
                    <span class="tag">Dropper</span>
                    <span class="tag">Rust</span>
                    <span class="tag">Stealer</span>
                </div>
            </div>
            <div class="date">Июнь 2026</div>
        </a>

        <a href="/reports/" class="report-item">
            <i class="fas fa-file-lines main-icon"></i>
            <div class="info">
                <div class="title">RE // Тестовый отчет</div>
                <div class="desc">Описание тестового разбора</div>
                <div class="tags">
                    <span class="tag">Test</span>
                    <span class="tag">Malware</span>
                </div>
            </div>
            <div class="date">Май 2026</div>
        </a>

        <div style="margin-top: 40px; font-size: 13px; color: rgba(255,255,255,0.15); text-align: center; letter-spacing: 1px;">
            Всего отчетов: 2
        </div>
    </div>
</body>
</html>
